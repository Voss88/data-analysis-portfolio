<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0F5741;
            --secondary-color: #F5F5F7;
            --text-color: #333333;
        }

        body {
            background-color: var(--secondary-color);
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Helvetica Neue", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .lock-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(to right, rgba(253, 9, 6, 1), rgba(255, 220, 0, 1));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .lock-circle i {
            color: white;
            font-size: 1.5rem;
        }

        .login-card h2 {
            color: var(--text-color);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 1.4rem;
        }

        .login-card p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }

        .form-control {
            border-radius: 10px;
            border: 1.5px solid #e0e0e0;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(15, 87, 65, 0.1);
        }

        .form-control.is-invalid {
            border-color: #dc3545;
            box-shadow: none;
        }

        .btn-unlock {
            width: 100%;
            padding: 0.75rem;
            border-radius: 25px;
            border: none;
            background: linear-gradient(to right, rgba(253, 9, 6, 1), rgba(255, 220, 0, 1));
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1rem;
            transition: opacity 0.3s;
        }

        .btn-unlock:hover { opacity: 0.9; }

        .error-msg {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.25rem;
            color: #aaa;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--primary-color); }

        .password-wrapper { position: relative; }

        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #aaa;
            font-size: 0.9rem;
            background: none;
            border: none;
            padding: 0;
        }

        .toggle-pw:hover { color: var(--text-color); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="lock-circle">
            <i class="fas fa-lock"></i>
        </div>
        <h2>Private Projects</h2>
        <p>This section is password protected.</p>

        <form id="loginForm" onsubmit="checkPassword(event)">
            <div class="password-wrapper">
                <input
                    type="password"
                    id="passwordInput"
                    class="form-control"
                    placeholder="Enter password"
                    autocomplete="current-password"
                >
                <button type="button" class="toggle-pw" onclick="toggleVisibility()">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
            <div class="error-msg" id="errorMsg">Incorrect password. Please try again.</div>
            <button type="submit" class="btn-unlock">
                <i class="fas fa-unlock me-2"></i>Unlock
            </button>
        </form>

        <a href="../main-pages/projects.html" class="back-link">
            <i class="fas fa-arrow-left me-1"></i>Back to Projects
        </a>
    </div>

    <script>
        const _k = atob('cGFzc3cwcmQx');

        function checkPassword(e) {
            e.preventDefault();
            const input = document.getElementById('passwordInput');
            const errorMsg = document.getElementById('errorMsg');

            if (input.value === _k) {
                sessionStorage.setItem('pv_auth', '1');
                window.location.href = 'private-projects-index.html';
            } else {
                input.classList.add('is-invalid');
                errorMsg.style.display = 'block';
                input.value = '';
                input.focus();
            }
        }

        function toggleVisibility() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('passwordInput').addEventListener('input', function() {
            this.classList.remove('is-invalid');
            document.getElementById('errorMsg').style.display = 'none';
        });
    </script>
</body>
</html>
